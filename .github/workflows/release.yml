name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish. Leave empty for a manual build tag."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_type == 'tag' && github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  APP_SLUG: south_plus_rewrite

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing key
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured."
            exit 1
          fi

          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/${APP_SLUG}-android-universal.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release/${APP_SLUG}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "release/${APP_SLUG}-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "release/${APP_SLUG}-android-x86_64.apk"
          cp build/app/outputs/bundle/release/app-release.aab "release/${APP_SLUG}-android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release/*
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "release/${env:APP_SLUG}-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows
    steps:
      - name: Checkout release metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag || '' }}
          REQUESTED_PRERELEASE: ${{ github.event.inputs.prerelease || false }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${REQUESTED_TAG}" ]]; then
            tag="${REQUESTED_TAG}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi

          version="${tag#v}"
          title="South Plus Pro ${tag}"
          notes_file="docs/releases/${tag}.md"

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "title=${title}"
            echo "notes_file=${notes_file}"
            echo "prerelease=${REQUESTED_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Build release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
        run: |
          set -euo pipefail

          previous_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+' | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"
          compare_range=""
          if [[ -n "${previous_tag}" ]] && git rev-parse -q --verify "${RELEASE_TAG}^{commit}" >/dev/null; then
            compare_range="${previous_tag}..${RELEASE_TAG}"
          fi

          {
            echo "# ${RELEASE_TITLE}"
            echo
            if [[ -f "${RELEASE_NOTES_FILE}" ]]; then
              sed '1{/^# /d;}' "${RELEASE_NOTES_FILE}"
              echo
            else
              echo "## Highlights"
              echo
              echo "- Release notes for ${RELEASE_TAG} have not been written yet."
              echo "- Add them in \`${RELEASE_NOTES_FILE}\` before tagging to make this section richer."
              echo
            fi

            echo "## Downloads"
            echo
            echo "| Platform | Asset | Best for |"
            echo "| --- | --- | --- |"
            echo "| Android | \`${APP_SLUG}-android-arm64-v8a.apk\` | Most modern phones and tablets. Smaller than the universal APK. |"
            echo "| Android | \`${APP_SLUG}-android-armeabi-v7a.apk\` | Older 32-bit Android devices. |"
            echo "| Android | \`${APP_SLUG}-android-x86_64.apk\` | Emulators and uncommon x86_64 Android devices. |"
            echo "| Android | \`${APP_SLUG}-android-universal.apk\` | Safest manual install when you are unsure which CPU your device uses. |"
            echo "| Android | \`${APP_SLUG}-android.aab\` | Store upload bundle, not intended for direct installation. |"
            echo "| Windows | \`${APP_SLUG}-windows-x64.zip\` | Windows 10/11 x64 desktop. |"
            echo
            echo "## Integrity"
            echo
            echo "Download \`SHA256SUMS.txt\` from this release to verify files after download."
            echo
            echo "## Commits"
            echo
            if [[ -n "${compare_range}" ]]; then
              git log --no-merges --pretty='- %s (%h)' "${compare_range}"
            else
              git log --no-merges --pretty='- %s (%h)' -n 20
            fi
          } > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body_path: release-notes.md
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: artifacts/*

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Release"
            echo
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Android APKs: universal, arm64-v8a, armeabi-v7a, x86_64"
            echo "- Windows: x64 zip"
            echo "- Checksums: \`SHA256SUMS.txt\`"
          } >> "${GITHUB_STEP_SUMMARY}"
