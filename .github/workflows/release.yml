name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing key
        shell: bash
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured."
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build APK
        run: flutter build apk --release

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/south_plus_rewrite-android.apk
          cp build/app/outputs/bundle/release/app-release.aab release/south_plus_rewrite-android.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release/*

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath release/south_plus_rewrite-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Manual build {0}', github.run_number) }}
          files: artifacts/*
