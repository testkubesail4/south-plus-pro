name: Release Status

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: release-status
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror latest release result
    runs-on: ubuntu-latest
    steps:
      - name: Resolve upstream release run
        id: upstream
        uses: actions/github-script@v7
        with:
          script: |
            let upstream;

            if (context.eventName === "workflow_run") {
              upstream = context.payload.workflow_run;
            } else {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "release.yml",
                per_page: 1,
                status: "completed",
              });

              if (!response.data.workflow_runs.length) {
                core.setFailed("No completed Release workflow runs were found.");
                return;
              }

              upstream = response.data.workflow_runs[0];
            }

            core.setOutput("id", String(upstream.id));
            core.setOutput("url", upstream.html_url || "");
            core.setOutput("conclusion", upstream.conclusion || "unknown");
            core.setOutput("event", upstream.event || "unknown");
            core.setOutput("ref", upstream.head_branch || "");
            core.setOutput("sha", upstream.head_sha || "");

      - name: Mirror upstream status
        shell: bash
        env:
          UPSTREAM_ID: ${{ steps.upstream.outputs.id }}
          UPSTREAM_URL: ${{ steps.upstream.outputs.url }}
          UPSTREAM_CONCLUSION: ${{ steps.upstream.outputs.conclusion }}
          UPSTREAM_EVENT: ${{ steps.upstream.outputs.event }}
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail

          {
            echo "## Release status mirror"
            echo
            echo "- Upstream run: [${UPSTREAM_ID}](${UPSTREAM_URL})"
            echo "- Conclusion: \`${UPSTREAM_CONCLUSION}\`"
            echo "- Event: \`${UPSTREAM_EVENT}\`"
            echo "- Ref: \`${UPSTREAM_REF}\`"
            echo "- SHA: \`${UPSTREAM_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${UPSTREAM_CONCLUSION}" != "success" ]]; then
            echo "Latest Release workflow run did not succeed: ${UPSTREAM_CONCLUSION}"
            exit 1
          fi
